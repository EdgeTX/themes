name: Build Release ZIP

on:
  push:
    branches: [main]
    paths:
      - 'THEMES/**'
      - '.github/workflows/build_release.yml'
  pull_request:
    paths:
      - 'THEMES/**'
      - '.github/workflows/build_release.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate themes
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Run theme validator
        run: uv run tools/validate_themes.py

  package:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Zip releases
        run: |
          mkdir -p release/all release/individual
          zip -r release/all/edgetx-themes.zip THEMES
          for dir in THEMES/*/; do
            name=$(basename "$dir")
            (cd THEMES && zip -r "../release/individual/${name}.zip" "$name")
          done

      - name: Upload all-themes artifact
        uses: actions/upload-artifact@v7
        with:
          name: themes-latest
          path: release/all
          retention-days: 15
          if-no-files-found: error

      - name: Upload individual-themes artifact
        uses: actions/upload-artifact@v7
        with:
          name: themes-individual
          path: release/individual
          retention-days: 15
          if-no-files-found: error

  generate-changelog:
    if: github.event_name != 'pull_request'
    needs: package
    runs-on: ubuntu-latest
    outputs:
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          VERSION=$(wget -qO- https://api.github.com/repos/orhun/git-cliff/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/' | sed 's/^v//')
          FILENAME="git-cliff-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          wget -O git-cliff.tar.gz \
            "https://github.com/orhun/git-cliff/releases/download/v${VERSION}/${FILENAME}"
          tar -xzvf git-cliff.tar.gz
          sudo mv "git-cliff-${VERSION}/git-cliff" /usr/local/bin/

      - name: Generate changelog
        id: changelog
        run: |
          PREV_SHA=$(git rev-parse latest 2>/dev/null || echo "")
          if [ -n "$PREV_SHA" ]; then
            RANGE="${PREV_SHA}..HEAD"
          else
            RANGE=""
          fi
          git-cliff $RANGE --strip all --output CHANGELOG.md
          {
            echo "changelog<<EOF"
            cat CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  upload:
    if: github.event_name != 'pull_request'
    needs: [package, generate-changelog]
    name: Upload latest release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: themes-latest
          path: release/all

      - name: Update latest tag
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Delete previous latest release
        run: gh release delete latest --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "Latest Themes Package"
          prerelease: false
          make_latest: true
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: release/all/edgetx-themes.zip

  upload-individual:
    if: github.event_name != 'pull_request'
    needs: [package, generate-changelog]
    name: Upload individual theme releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: themes-individual
          path: release/individual

      - name: Update individual-themes tag
        run: |
          git tag -f individual-themes
          git push -f origin individual-themes

      - name: Delete previous individual-themes release
        run: gh release delete individual-themes --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload individual theme ZIPs to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: individual-themes
          name: "Individual Theme Packages"
          prerelease: false
          make_latest: false
          body: ${{ needs.generate-changelog.outputs.changelog }}
          files: release/individual/*.zip
